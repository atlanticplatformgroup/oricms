# =============================================================================
# OriCMS - Production Docker Compose
# =============================================================================

services:
  # ===========================================================================
  # Frontend (React)
  # ===========================================================================
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-oricms/oricms}/web:latest
    container_name: oricms-web
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
    ports:
      - "80:8080"
    depends_on:
      - api
    networks:
      - oricms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # API (Express)
  # ===========================================================================
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-oricms/oricms}/api:latest
    container_name: oricms-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - ALLOW_FILE_REPO_URLS=false
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-oricms}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - APP_BASE_URL=${APP_BASE_URL}
      - TRUST_PROXY=${TRUST_PROXY:-1}
      - RATE_LIMIT_REDIS_URL=${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      - RATE_LIMIT_REDIS_PREFIX=${RATE_LIMIT_REDIS_PREFIX:-oricms:rate-limit}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    expose:
      - "3001"
    volumes:
      - api-uploads:/app/uploads
      - git-repos:/app/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oricms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Shared Rate-Limit Store (Redis)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: oricms-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - oricms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Database (PostgreSQL)
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: oricms-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-oricms}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - oricms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-oricms}"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
  redis-data:
  api-uploads:
  git-repos:

# =============================================================================
# Networks
# =============================================================================
networks:
  oricms-network:
    driver: bridge
